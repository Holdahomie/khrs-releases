<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>ZakresPro - Dodaj update</title>
<style>
  :root{--ink:#15171A;--ink2:#5B6470;--ink3:#8A929C;--line:#E7EAE9;--green:#11A85C;--green-soft:#E6F6EE;--green-ink:#0B7B43}
  *{box-sizing:border-box}body{margin:0;background:#F4F6F5;color:var(--ink);font-family:-apple-system,Segoe UI,Roboto,system-ui,sans-serif;line-height:1.5;padding:18px}
  .c{max-width:460px;margin:0 auto;background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px}
  .a{font-size:11px;font-weight:700;color:var(--green)}h1{font-size:19px;margin:4px 0 2px}.s{font-size:13px;color:var(--ink2);margin-bottom:6px}
  label{display:block;font-size:12.5px;font-weight:600;color:var(--ink2);margin:14px 0 5px}
  input,textarea,select{width:100%;font:inherit;font-size:15px;border:1px solid var(--line);border-radius:11px;padding:11px;background:#fff}
  textarea{min-height:64px}
  .pick{height:120px;border:1.5px dashed #C9D2CC;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--ink3);font-size:13px;cursor:pointer;background:#fafbfa}
  img{width:100%;border-radius:12px;display:block}
  .stages{display:flex;flex-wrap:wrap;gap:7px}
  .stages button{border:1px solid var(--line);background:#fff;border-radius:11px;padding:9px 12px;font:inherit;font-weight:600;font-size:13px;color:var(--ink2);cursor:pointer}
  .stages button.on{border-color:var(--green);background:var(--green-soft);color:var(--green-ink)}
  .btn{width:100%;border:0;border-radius:12px;padding:14px;font:inherit;font-weight:700;background:var(--green);color:#fff;margin-top:18px;cursor:pointer}
  .btn:disabled{opacity:.5}
  .f{font-size:11px;color:var(--ink3);text-align:center;padding:16px}
  details{margin-top:14px}summary{font-size:13.5px;font-weight:600;color:var(--ink2);cursor:pointer}
</style>
</head>
<body>
<div class="c" id="root"><div class="s">Wczytuję…</div></div>
<div class="f">Dodajesz update do roboty · zdjęcia bez danych lokalizacji · powered by ZakresPro / KHRS</div>
<script>
  const FUNCTION_URL = 'https://auxhgebfsndjnneguprv.functions.supabase.co/public-card'
  const token = new URLSearchParams(location.search).get('c') || ''
  const root = document.getElementById('root')
  const esc = (s) => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))
  const safeUrl = (u) => /^https?:\/\//i.test(String(u || '')) ? String(u) : ''
  const STAGES = [['in_progress','🔨 W trakcie'],['issue','⚠️ Problem'],['done','✅ Zrobione'],['materials','📦 Materiały'],['before','📋 Przed'],['handover','🤝 Odbiór']]
  let stage = 'in_progress', photo = null

  function processPhoto(file, cb){
    const img = new Image()
    img.onload = () => { const max=1280; let w=img.width,h=img.height
      if(w>h&&w>max){h=Math.round(h*max/w);w=max} else if(h>max){w=Math.round(w*max/h);h=max}
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h)
      cb(cv.toDataURL('image/jpeg',0.8).split(',')[1]) }  // base64 bez prefiksu; re-enkodowanie usuwa EXIF
    img.src = URL.createObjectURL(file)
  }
  const msg = (t) => root.innerHTML = `<div class="a">ZakresPro</div><h1>${esc(t)}</h1>`

  function form(projectName, co){
    co = co || {}
    const head = co.name
      ? `${safeUrl(co.logo_url) ? `<img src="${esc(safeUrl(co.logo_url))}" alt="" style="width:38px;height:38px;border-radius:8px;display:block;margin-bottom:6px">` : ''}<div class="a">${esc(co.name)} · Dodaj update</div>`
      : `<div class="a">ZakresPro · Dodaj update</div>`
    root.innerHTML = `
      ${head}<h1>${esc(projectName)}</h1>
      <div class="s">Dodaj postęp do tej roboty. Pojawi się w dokumentacji po zatwierdzeniu przez wykonawcę.</div>
      <label>Zdjęcie</label>
      <div class="pick" id="pick"><span style="font-size:22px">📷</span><span>Zrób zdjęcie lub wybierz</span></div>
      <input id="file" type="file" accept="image/*" capture="environment" style="display:none">
      <label>Etap</label>
      <div class="stages" id="stages">${STAGES.map(([v,l])=>`<button data-v="${v}" class="${v==='in_progress'?'on':''}">${l}</button>`).join('')}</div>
      <label>Opis (krótko)</label>
      <textarea id="note" placeholder="np. położone płytki na ścianie północnej"></textarea>
      <label>Twoje imię</label>
      <input id="author" placeholder="np. Marek (glazurnik)">
      <details><summary>Zgłoś materiał do dokupienia (opcjonalnie)</summary>
        <label>Nazwa materiału</label><input id="mat" placeholder="np. klej elastyczny">
      </details>
      <button class="btn" id="send">Wyślij update</button>`
    document.getElementById('pick').onclick = () => document.getElementById('file').click()
    document.getElementById('file').onchange = (e) => { const f=e.target.files[0]; if(!f) return
      processPhoto(f, b64 => { photo=b64; document.getElementById('pick').outerHTML = `<img id="pick" src="data:image/jpeg;base64,${b64}">` }) }
    document.querySelectorAll('#stages button').forEach(b => b.onclick = () => {
      document.querySelectorAll('#stages button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); stage=b.dataset.v })
    document.getElementById('send').onclick = send
  }
  async function send(){
    const note = document.getElementById('note').value.trim()
    const author_name = document.getElementById('author').value.trim()
    const mat = document.getElementById('mat')?.value.trim()
    if(!note && !photo && !mat) return alert('Dodaj zdjęcie, opis albo materiał')
    const btn = document.getElementById('send'); btn.disabled = true; btn.textContent = 'Wysyłam…'
    try{
      const r = await fetch(FUNCTION_URL + '?c=' + encodeURIComponent(token), { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ stage, note, author_name, photoBase64: photo, material: mat ? { name: mat } : null }) })
      const j = await r.json()
      if(j.ok) msg('Dodano update. Pojawi się w dokumentacji po zatwierdzeniu.')
      else if(j.reason === 'read_only') msg('Dodawanie chwilowo wstrzymane. Skontaktuj się z wykonawcą.')
      else msg('Nie udało się. Link może być nieaktywny.')
    }catch(e){ btn.disabled=false; btn.textContent='Wyślij update'; alert('Brak połączenia, spróbuj ponownie') }
  }
  async function load(){
    if(!token) return msg('Nieprawidłowy adres.')
    try{ const r = await fetch(FUNCTION_URL + '?c=' + encodeURIComponent(token)); const d = await r.json()
      if(!d.ok) return msg('Link wygasł lub jest nieaktywny.')
      form(d.project.name, d.company)
    }catch(e){ msg('Brak połączenia. Odśwież stronę.') }
  }
  load()
</script>
</body>
</html>
