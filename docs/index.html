<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>ZakresPro — Karta Zmiany</title>
<style>
  :root{--ink:#15171A;--ink2:#5B6470;--line:#E7EAE9;--green:#11A85C;--amber:#B7791F}
  *{box-sizing:border-box}body{margin:0;background:#F4F6F5;color:var(--ink);font-family:-apple-system,Segoe UI,Roboto,system-ui,sans-serif;line-height:1.5;padding:18px}
  .c{max-width:460px;margin:0 auto;background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden}
  .h{padding:18px 18px 12px;border-bottom:1px solid var(--line)}.a{font-size:11px;font-weight:700;color:var(--green)}
  h1{font-size:18px;margin:4px 0 0}.b{padding:18px}img{width:100%;border-radius:12px;margin-bottom:12px;display:block}
  p{margin:0 0 12px}.lbl{font-size:12px;color:var(--ink2);font-weight:600}
  .r{display:flex;justify-content:space-between;padding:10px 0;border-top:1px solid #eee}.r b{font-weight:700}.amber{color:var(--amber)}
  textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px;font:inherit;margin:6px 0 14px;min-height:60px}
  button{width:100%;border:0;border-radius:12px;padding:14px;font:inherit;font-weight:700;cursor:pointer;margin-bottom:8px}
  .ok{background:var(--green);color:#fff}.q{background:#fff;color:var(--ink);border:1px solid var(--line)}.no{background:#fff;color:#B42318;border:1px solid #F1C9C4}
  .f{font-size:11px;color:#8A929C;text-align:center;padding:14px}.note{font-size:14px;color:var(--ink2)}
  .muted{color:var(--ink2)}
</style>
</head>
<body>
<div class="c" id="root"><div class="b"><p class="note">Wczytuję…</p></div></div>
<div class="f">Dokumentacja operacyjna · zdjęcia bez danych lokalizacji · link prywatny · powered by KHRS</div>
<script>
  const FUNCTION_URL = 'https://auxhgebfsndjnneguprv.functions.supabase.co/public-card'
  const t = new URLSearchParams(location.search).get('t') || ''
  const root = document.getElementById('root')
  const esc = (s) => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))
  const money = (a, cur) => a == null ? '—' : new Intl.NumberFormat('pl-PL').format(Number(a)) + ' ' + (cur || 'PLN')
  const term = (d) => !d ? 'Bez wpływu na termin' : d === 1 ? '+1 dzień' : '+' + d + ' dni'

  function msg(title, text){ root.innerHTML = `<div class="h"><div class="a">ZakresPro</div><h1>${esc(title)}</h1></div><div class="b"><p class="note">${esc(text)}</p></div>` }

  function renderCard(d){
    const c = d.card
    const why = c.discovery_explanation ? `<p class="lbl">Dlaczego wyszło to dopiero teraz?</p><p>${esc(c.discovery_explanation)}</p>` : ''
    root.innerHTML = `
      <div class="h"><div class="a">ZakresPro · Karta Zmiany Zakresu</div><h1>Czeka na Twoją odpowiedź</h1></div>
      <div class="b">
        ${d.photoUrl ? `<img src="${esc(d.photoUrl)}" alt="zdjęcie">` : ''}
        <p><b>${esc(c.title)}</b></p>
        ${c.description ? `<p>${esc(c.description)}</p>` : ''}
        ${why}
        <div class="r"><span>Dopłata</span><b class="amber">${money(c.price_delta_amount, c.currency)}</b></div>
        <div class="r"><span>Wpływ na termin</span><b>${term(c.term_impact_days)}</b></div>
        <p class="lbl" style="margin-top:16px">Komentarz (opcjonalnie)</p>
        <textarea id="comment" placeholder="Możesz dopisać pytanie lub uwagę"></textarea>
        <button class="ok" data-d="accept">Akceptuję</button>
        <button class="q"  data-d="question">Mam pytanie</button>
        <button class="no" data-d="decline">Odmawiam</button>
      </div>`
    root.querySelectorAll('button[data-d]').forEach(btn => btn.addEventListener('click', () => decide(btn.getAttribute('data-d'))))
  }

  async function decide(decision){
    root.querySelectorAll('button').forEach(b => b.disabled = true)
    const comment = (document.getElementById('comment') || {}).value || ''
    try{
      const r = await fetch(FUNCTION_URL, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ t, decision, comment }) })
      const j = await r.json()
      if(j.ok){
        const label = decision === 'accept' ? 'Dziękujemy — zmiana zaakceptowana.' : decision === 'question' ? 'Dziękujemy — wykonawca odezwie się w sprawie Twojego pytania.' : 'Dziękujemy — odpowiedź zapisana.'
        msg('Zapisano', label)
      } else if(j.reason === 'already'){
        msg('Decyzja została już zapisana', 'Dziękujemy — Twoja odpowiedź jest już u wykonawcy.')
      } else {
        msg('Coś poszło nie tak', 'Spróbuj ponownie za chwilę.')
      }
    }catch(e){ msg('Brak połączenia', 'Sprawdź internet i odśwież stronę.') }
  }

  async function load(){
    if(!t) return msg('Brak linku', 'Nieprawidłowy adres.')
    try{
      const r = await fetch(FUNCTION_URL + '?t=' + encodeURIComponent(t))
      const d = await r.json()
      if(!d.ok) return msg('Link wygasł lub jest nieaktywny', 'Poproś wykonawcę o nowy link.')
      if(d.decided) return msg('Decyzja została już zapisana', 'Dziękujemy — Twoja odpowiedź jest już u wykonawcy.')
      renderCard(d)
    }catch(e){ msg('Brak połączenia', 'Sprawdź internet i odśwież stronę.') }
  }
  load()
</script>
</body>
</html>
